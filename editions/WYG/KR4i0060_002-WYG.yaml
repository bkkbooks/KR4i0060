body:
  text: 聲調譜巻二右贊善趙執信撰五言古詩與髙適薛據同登慈恩寺塔岑參塔勢如湧出拗句孤髙聳天宮登臨出世界磴道盤虛空突兀壓神州律句峥嶸如鬼工四角碍白日五仄七層摩蒼穹下窺指髙鳥俯聽聞驚風連山若波濤奔凑争朝東青槐夹馳道拗律句宫館何玲瓏秋色從西來蒼然滿闗中五陵北原上萬古青濛濛静理了可悟五庂勝因夙所宗拗句誓將掛冠去覺道資無窮結四句文選體無一聮是律者平韻古體以此為式前譜中亦具矣崔濮陽兄季重前山興王維秋色有佳興况君池上閒起二句在律詩中則為用古調即是拗律悠悠西林下自識門前山千里橫黛色數峰出雲間嵯峨對秦國拗律句合沓藏荆闗殘雨斜日照夕嵐飛鳥還拗律句故人今尚爾歎息此頺顔末二句入律盛唐人時有之亦粘拗律句調也青谿言入黃花川毎逐青谿水律句隨山將萬轉律句趨途不粘無百里律句聲喧亂石中色静深松裏二句律粘漾漾汎菱荇拗律句澄澄映葭葦拗律句我心素已閒清川淡如此拗律句請留盤石上律句上字仄合下句便非律體垂釣將已矣近體有用仄韻者仄韻古詩却自不同只在粘聮及上句落字中細玩之秋登萬山寄張五孟浩然北山白雲裏我心素已閒并此俱是天然古句隱者自怡恱拗律句相望試登髙律句心隨雁飛㓕拗律句愁因薄暮起仄字此句落字仄合下律句仍是古調興是清秋發律句時見歸村人平沙渡頭歇拗律句天邉樹若薺仄字第三字用仄亦拗律調也上薄暮句同江畔洲如月律句正以上句第三字第五字用仄而調協清秋句同何當載酒來共醉重陽節末二句入律平平仄平仄為拗律句乃仄韻古詩下句之正調也夏日南亭懐辛大山光忽西落第五字仄池月漸東上􅄆髪乗夜凉開軒臥閒敞同起句俱拗律句荷風送香氣第五字仄拗律句竹露滴清響第三字仄亦拗律句欲取鳴琴彈恨無知音賞感此懐故人中心勞夢想律句開元天寳之間鉅公大手頗尚不循沈宋之格至中唐以後詩賦試帖日嚴古近體遂判不相入然盛唐諸公詩亦無四句純律者今人不得藉口也七言古詩扶風豪士歌李白洛陽三月飛胡沙洛陽城中人怨嗟天津流水波赤血古句白骨相撐如亂麻辣句我亦東奔向吴國浮雲四塞道路賖東方日出啼早鴉城門人開掃落花梧桐楊栁拂金井來醉扶風豪士家將轉韻處微入律参之第四句與此二句俱拗律調扶風豪士天下奇轉仍用平韻意氣相傾山可移拗律句作人不倚將軍勢律句飲酒豈顧尚書期雕盤綺食㑹衆客吴歌趙舞香風吹原嘗春陵六國時叠韻参之開心寫意君所知堂中各有三千士明日報恩知是誰二句近律然音調妙絶参之上句律下句拗律撫長劍一揚眉清水白石何離離脫吾㡌向君笑忽二短句改仄韻飲君酒為君吟張良未逐赤松去拗律句槗邉黃石知我心結以張良自寓方與篇首相闗此歌行之極則神變不可方物矣同族弟金城尉叔卿燭照通首在此二字着眼山水壁畫歌高堂粉壁圗蓬瀛燭前一見滄洲情洪波洶湧山峥嶸皎若丹丘隔海望赤四仄字城九字句只以下七字為主光中乍喜嵐氣仄滅謂逄山隂晴四平字後雪迴溪碧流寂無喧又如秦人月下窺桃源調法見上註了然不覺清心魂叠韻妙絶祗將叠嶂鳴秋猿與君對此歡未仄歇放歌行吟達明發完燭照却顧海客揚雲㠶便欲因之向溟渤拗律句也末句亦是仄韻七言古詩正調與五言同夢逰天姥吟㽞别海客談瀛洲煙濤微茫信難求越人語天姥雲霓眀滅或可覩覩此可知轉韻元無定格也天姥連天向天橫勢㧞五岳掩赤六字仄城天台四萬八千丈拗律句對此欲倒東南傾我欲因之夢吴越拗律句一夜飛度仄鏡湖月湖月照我影送我至剡四仄字溪謝公宿處今尚在淥水蕩漾清猿啼脚著謝公屐拗律句身登青雲梯五平字半壁見海日五仄字空中聞天雞五平字千巖萬轉路不定迷花倚石忽已暝熊咆龍吟殷巖泉慄深林兮驚層巔雲青青兮欲雨水澹澹兮生烟列缺霹靂丘巒崩摧洞天石扇訇然中開六字句四字句細玩之青𡨕浩蕩不見底日月照耀金銀䑓霓為衣兮風為馬雲之君兮紛紛而來下虎鼓瑟兮鸞迴車仙之人兮列如麻忽魂悸以魄動怳驚起而長嗟惟覺時之枕席失向來之煙霞此四句皆六言若非下句用三平則失調参之世間行樂亦如此拗律句古來萬事東流水律句别君去兮何時還且放白鹿青崖間須行即騎四字字法句法俱妙訪名山多一句用韻宕甚妙甚味之安能摧眉折腰事權貴使我不得開心顔樂逰園歌杜甫樂遊古園崒森爽烟緜碧草萋萋長律句公子華筵勢㝡髙秦川對酒平如掌二句律詩調長生木瓢示真率更調鞍馬狂歡賞律句青春波浪芙蓉園白日雷霆夹城仗拗律句閶闔晴開詄蕩蕩用仄字妙曲江翠幕排銀牓律句拂水低徊舞袖飜緣雲清切歌聲上律詩調却憶年年人醉時只今未醉已先悲數莖白髪那抛得拗百罰深杯亦不辭純用律調六句却妙絶聖可平朝亦知賤士醜一物自荷皇天慈此身飲罷無歸處獨立蒼茫自詠詩二句律渼陂行岑参兄弟皆好竒擕我逺來遊渼陂拗律句天地黯慘忽異色六仄字波濤萬頃堆琉璃琉璃汗漫泛舟入拗律句事殊興極憂思仄字集鼉作鯨吞不復知惡風白浪何嗟及二句律主人錦㠶相為開舟子喜甚無氛埃鳬鷖散亂棹謳發絲管啁啾空翠来二句拗律詩調沉竿續縵深莫測菱葉荷花浄如拭拗律句宛在中流渤澥清下歸無極終南黑二句律詩調半陂已南純浸山動影窈窕冲融間此處平下轉韻用平船舷暝戞雲際寺水靣月出藍田闗此時驪龍亦吐珠馮夷擊鼓羣龍趨湘妃漢女出歌舞拗律句金支翠旗光有無咫尺但愁雷雨至蒼茫不曉神靈意二句律少壯㡬時奈老何向来哀樂何其多已盡轉韻之格調矣丹青引將軍魏武之子孫于今為庶為清門英䧺割據雖已矣文采風流今平尚存律句少拗學書初學衛夫人律句但恨無過王平右軍律句少拗丹青不知老將至富貴於我如浮雲開元之中常引見承恩數上南薰殿律句凌烟功臣少顔色將軍下筆開生面律句良相頭上進賢冠猛將腰間大羽箭褒公鄂公毛髪動英姿颯爽來酣戰律句先帝天馬玉花驄畫工如山貎不同是日牽來赤墀下拗律句迥立閶闔生長風詔謂將軍拂絹素意匠慘淡經營中斯須九重真龍出一洗萬古凡馬空玉花却在御榻上榻上庭前屹相向轉韻句要𦂳拗律句至尊含笑催賜金圉人太僕皆惆悵半律句以第一字第三字皆仄也弟子韓幹早入室六仄亦能畫馬窮殊相半律句幹惟畵肉不畫骨六仄忍使驊騮氣凋䘮拗律句將軍畫善盖有神每逢佳士亦寫真即今飄泊干戈際律句屢貎尋常行平最要𦂳路人律句亦拗途窮反遭俗眼白世上未有如公貧但㸔古來盛名下拗律句終日坎􅇄纒其身寄韓諌議注今我不樂思岳陽身欲奮飛病在牀美人娟娟隔秋水濯足洞庭望八荒鴻飛㝠𡨕日月白青楓葉赤天雨霜玉京羣帝集北斗或騎麒麟翳鳳凰芙蓉旌旗烟霧樂影動倒景揺瀟湘星宫之君醉瓊漿叠韻羽人稀少不在旁似聞昨者赤松子拗律句恐是漢代韓張良昔隨劉氏定長安落字用平律句帷幄未改神慘傷國家成敗吾豈敢色難腥腐餐楓香周南㽞滯古所惜南極老人應夀昌羙人胡為平聲語辭也隔秋水焉得置之貢玉堂通篇比興平韻不轉格妙不板排陸渾山火和皇甫湜用其韻韓愈皇甫補官古賁渾時當𤣥冬澤乾源山狂谷狠相吐吞風怒不休何軒軒擺磨出火以自燔有聲夜中驚莫原天跳地踔顛乾坤赫赫上照窮厓垠截然髙周燒四垣神焦鬼爛無逃門三光弛隳不復暾虎熊麋猪逮猴猿水龍鼉龜魚與黿鴉鴟鵰鷹雉鵠鵾燖炰煨􅠉孰飛奔祝融告休酌卑尊錯陳齊去聲玫闢華園芙蓉披猖塞鮮繁千鐘萬鼔咽耳喧攅雜啾嚄沸箎塤彤幢綘旃紫纛旛炎官熱屬朱冠褌髹其肉皮通䏶臀穨胸垤腹車掀轅緹顔韎股豹兩鞬霞車虹靷日轂轓丹㽔縓蓋緋繙㠾紅帷赤幙羅脤膰􅎺池波風肉陵屯谽砑巨壑頗黎盆豆登五山瀛四罇熈熈釂醻笑語言雷公擘山海水翻齒牙嚼齧舌腭反電光䃱磹赬目暖頊寘収威避𤣥根斥葉輿馬背厥孫縮身潛喘拳肩跟君臣相憐加愛恩命黒螭偵焚其元天闗悠悠不可援夢通上帝血面論側身欲進叱於閽律句帝賜九河湔涕㾗拗律句又詔巫陽反其魂徐命之前問何寃火行於冬古所存我如禁之絶其飱女丁婦壬傳世婚一朝結讎奈後昆時行當反愼蔵存律句視桃著花可小騫月及申酉利復怨助汝五龍及九鯤溺厥邑囚之崑崙皇甫作詩止睡昏辭誇出真遂上焚要予和增怪又煩雖欲悔舌不可捫古詩平韻句法盡於此中矣柏梁句句用韻雜律句其中猶不用韻之句偶入律調下句救之也此篇各種句法俱備然中有數句雖是古體止可用於柏梁至於尋常古詩斷不可用轉韻尤不可用用之則失調當細辨之如仄仄平平平平平仄仄仄平平平平是也又如平平平平仄平平亦當酌用之轉韻中不宜以其乖於音節耳石鼓歌張生手持石鼓文起句不押韻勸我試作石鼓歌少陵無人謫仙死才薄將奈石鼓何周綱陵遲四海沸宣王憤起揮天戈大開眀堂受朝賀諸侯劍佩鳴相磨蒐于岐陽騁䧺俊萬里禽獸皆遮羅鐫功勒成告萬世鑿石作鼓隳嵯峨從臣才藝咸第一揀選譔刻㽞山阿雨淋日炙野火燎鬼神守䕶煩撝呵公從何處得紙本毫髪盡偹無差訛辭巖義宻讀難曉拗律句字體不類𨽻與蝌年深豈免有缺畫快劍斫斷生蛟鼉鸞翔鳯翥衆仙下拗律句珊瑚碧樹交枝柯金繩鐡索鎻紐壮古鼎躍水龍騰梭陋儒編詩不収入二雅褊廹無委佗孔子西行不到秦平律句掎摭星宿遺羲娥嗟予好古生苦晚對此涕淚雙滂沱憶昔初䝉博士徴平律句其年始改稱元和故人從軍左右輔為我量度掘臼科濯冠沐浴告祭酒如此至寳存豈多氊包席裹可立致十鼓祗載數駱駝薦諸太廟比郜鼎光價豈止百倍過聖㤙若許㽞太學諸生講觧得切磋觀經鴻都尚填咽坐見舉國来奔波剜苔剔蘚露節角安置妥帖平不頗大厦深簷與仄蓋覆律句少拗經厯年逺期無它中朝大官老於事詎肯感激徒媕娿牧童敲火牛礪角誰復著手為摩娑日銷月鑠就埋沒拗律句六年西顧空吟哦羲之俗書趂姿媚數紙尚可博白鵞繼周八代争戰罷無人収拾理則那方今太平無事日柄任儒術崇丘軻安能以此上論列願借辯口如懸河石鼓之歌止於此拗律句嗚呼吾意其蹉跎雪後寄崔二十六丞公藍田十月雪塞闗我興南望愁羣山攅天嵬嵬凍相映君仍寄命於其間秩卑俸薄食口衆豈有酒食開容顔殿前羣公賜食罷驊騮蹋路驕且閑稱多量少鑒裁宻拗律句豈念幽桂遺榛菅㡬欲犯嚴出薦口第四字平近律而拗氣象硉兀未可六仄攀歸来隕涕掩闗臥拗律句心之紛亂誰能刪六平詩翁憔悴劚荒棘拗律句清玉刻佩聮玦環腦脂遮眼卧壯士大弨掛壁無由彎乾坤恵施萬物遂獨於數子懐偏慳朝欷暮唶不可觧我心安得如石頑押韻强稳開宋人法門韓碑李商隐元和天子神武姿彼何人哉軒與羲誓將上雪列聖恥六仄坐法宫中朝平四夷律句少拗淮西有賊五十載封狼生貙貙生羆七平不據山河據平地拗律句長戈利矛日可麾帝得聖相相曰度七仄賊斫不死神扶持腰懸相印作都統拗律句隂風慘淡天王旗愬武古通作牙爪拗律句儀曺外郎載筆隨行軍司馬智且勇十四萬衆猶虎貔入蔡縛賊獻太廟七仄功無與譲㤙不訾帝曰汝度功第一汝從事愈宜為詞愈拜稽上聲首蹈且舞七仄金石刻畫臣能為古者世稱平大手筆近律而拗此事不繋於職司當仁自古有不譲言訖屡頷天子頤拗律句公退齋戒坐小閣濡染大筆何淋漓㸃竄堯典舜典字塗改清廟生民詩文成破體書在紙清晨再拜鋪丹墀表曰臣愈昧死上咏神聖功書之碑碑髙三丈字如手拗律句負以靈鼇盤以螭二句拗律相儷句奇意重喻者少讒之天子言其私長䋲百尺拽碑倒拗律句麤砂大石相磨治公之斯文若元氣先時已入人肝脾湯盤孔鼎有述作今無其噐存其辭嗚呼聖皇及聖相相與烜赫此字必仄流淳熈此處註明第四字必仄以前句同調者可以知矣公之斯文不示後曷與三五相攀躋願書萬本誦萬遍口角流沫右手胝傳之七十有二代以為封禪玉檢眀堂基七言古不轉韻平聲格已盡矣仄韻可推齊梁體和杜麟臺元志春情沈佺期嘉樹滿中園氛氲羅秀色不見不粘上句仙山雲倚琴空太息沉思若在夢緘怨似無憶青春不粘上句坐南移白日忽西匿蛾眉不粘上句返清鏡閨中不相識末二句古體亦興古詩相入宿東亭曉興白居易温温土爐火耿耿紗籠燭獨抱一張琴夜入東齋宿折腰忩聲度殘漏此句却粘不折腰正調簾影浮初旭頭癢曉梳多眼昏春睡足負暄簷宇下第五字用仄散歩池塘曲南雁去未迴東風采何速雪依瓦溝白第五字仄草繞雲根緑何言不粘上句萬户州太守常幽獨若上句末字平及下聮與上聮相粘便是仄韻律詩也邊笳曲温庭筠朔管迎秋動末字仄雕隂鴈来早上郡不粘隠黃雲天山吹白草嘶馬不粘渡寒磧末字仄朝陽照雪堡江南戍客心門外芙蓉老晴雲李商隐緩逐煙波起如妬栁綿飄故臨飛閣度欲入迴波銷三平縈歌憐畫扇敞景弄柔條更奈天南位牛渚宿殘宵次句與末句上下不粘只本句調半格詩小閣閒坐白居易閣前竹蕭蕭第五字平閣下水潺潺律句拂簟巻簾坐清風生其間五平字静聞新蝉鳴逺見飛鳥可平惟此詩此字以獨仄見律還以上古體但有巾掛壁第古字仄古句而無客叩闗二疏返故里第五字仄四老歸舊山古句吾亦適所願第五字仄求閒而得閒後六句齊梁第二字上下粘末字上下諧五言律詩月夜杜甫今夜鄜州月閨中只獨㸔遥憐小兒女拗句未觧憶長安香霧雲鬟濕清輝玉臂寒何時倚虛幌拗句雙照淚㾗乾春宿左省花隠掖拗字垣平暮啾啾棲平鳥過星臨萬户動月傍九霄多不寢聽金鑰因風想玉珂明朝有封事拗句數問夜如何送逺帶甲滿天地拗句胡為君平逺行親朋盡可仄一哭鞍馬去孤城四句與前首起四句同調草朩歲月晚五仄字朩月二字入聲妙五仄無一入聲字在内依然無調也闗河霜此字必平雪清别離已昨日拗句中唐後無因見古人情登裴秀才小臺作王維端居不出戸滿目望雲山落日鳥邉下秋原人外閒遥知逺林際落日下三句皆拗不見此簷間好客多乗月應平聲門莫上闗與諸子登峴山孟浩然人事有代謝四仄徃来成平古今江山㽞勝跡我軰復登臨水落魚梁淺天寒夢澤深羊公碑尚在讀罷淚沾襟廣陵逢薛八士有不得志五仄棲棲吴必平楚間廣陵相遇罷彭蠡泛舟還檣出江中樹波連海上山風㠶白日逺何處更追攀與前譜合㸔盡之矣七言律詩望嶽杜甫西嶽崚嶒竦處尊諸峯羅立如兒孫拗句安得仙人九節杖安得二字不粘拄到玉女洗頭盆拗句車箱入谷無歸路箭括通天有一門稍待西風凉冷後髙尋白帝問真源前四句抝後四句諧正體也抝律上下句亦湏帶粘和裴廸登蜀州東亭送客逢早梅相憶見寄東閣官梅動詩興起句即拗今俗云必拗第三句方可誤也還如何遜在揚州此時對雪遥相憶送客逢春可自由幸不折來傷嵗暮若為㸔去亂鄉愁江邉一樹垂垂發朝夕催人自白頭所思苦憶荆州醉司馬同上謫官樽酒定常開九江日落醒何處一柱觀頭眠㡬回觀字仄眠字必平此字救上句亦救本句可憐懐抱向人盡欲問平安無平使來故凴錦水將雙淚好過瞿塘灔澦堆第七句本是正粘因第五句不粘此句亦不粘矣此種詩不可不學不可專學不學則無格專學則滑矣小寒食舟中作佳辰强飲食猶寒隠几蕭條戴鶡冠春水船如天上坐老年花似霧中㸔娟娟戱蝶過閒幔片片輕鷗下急湍雲白山青萬此字可仄第五字仄上二字必平若第三字仄則落調矣五言亦然餘里愁看直北是長安凡拗律詩無八句純拗者其中必有諧句如上四拗下四諧上六拗下二諧或中間拗前後諧若不粘不諧定是古詩五言絶句古怨孟郊試妾與君淚兩處滴池水看取芙蓉花今年為誰死此四句齊梁體送别丈夫未得意行行且低眉素琴弹復弹㑹有知音知此古絶句兩句為聮四句為絶始於六朝元非近體後人誤以絶句為絶律詩故致多此一門七言絶句橫江詞李白横江館前津吏迎向余東指海雲生郎今欲渡縁何事如此風波不可行樂府也山中問答問余何事棲碧山笑而不答心自閒桃花流水杳然去别有天地非人間古詩也山中與幽人對酌兩人對酌山花開一杯一杯復一杯我醉欲眠君且去明朝有意抱琴來拗體也後二句諧聲調譜巻二
