body:
  text: 提要聲調譜詩文評類臣等謹案聲調譜三巻國朝趙執信撰執信字仲符號秋谷晚號飴山老人益都人康熙己未進士官右春坊右贊善執信嘗問聲調於王士禎士禎靳不肯言執信乃發唐人諸集排比鈎稽竟得其法因著為此書其例古體詩五言重第三字七言重第五字而以上下二字消息之大抵以三平為正格其四平切脚如李商隠之咏神聖功書之碑兩平切脚如蘇軾之白魚紫蟹不論錢者謂之落調柏梁體及四句轉韻之體則不在此限焉律詩以本句平仄相救為單拗出句如杜甫之清新庾開府對句如王維之暮禽相與還是也兩句平仄相救為雙拗如許渾之溪雲初起日沈閣山雨欲來風滿樓是也其他變例數條皆本此而推之而起句結句不相對偶者則不在此限焉其説頗為精密惟所列李賀十二月樂府所標平仄不可解巻末附以古韻通轉其説尤謬蓋其門人所妄増者今特加刋削焉乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀聲調譜論例古樂府須知其題意眀其比興使氣味音節皆得古人之致可矣其詩有轉韻一韻長短句近體絶句之不同不可選也須細㑹之新樂府皆自製題大都言時事而中含美刺所謂言之者無罪聞之者足以為戒此詩家眞實本領近代名公亡之久矣亦宜全讀不必選也其體同古樂府少近體讀少陵所作自見漢人歌謡之采入樂府者如上㽞田霍家奴羅敷行之類多言當世事少陵所作新題樂府題雖異於古人而深得古人之理元白以後此體紛紛矣縂而言之制詩以協於樂一也采詩入樂二也古有此曲倚其聲為詩三也自製新曲四也擬古五也咏古題六也并少陵之新題樂府而為七古樂府盡此矣唐末有長短句宋有詞金有北曲元有南曲今有北人之小曲南人之吴歌皆樂府之餘裔也樂府不難知而今人都不觧請具言之太白祖述騷雅下逮梁陳七言無所不包奇之又竒而字字有本諷刺沉切自古未有也後人宜以為法樂府本詞多平美晋魏宋齊樂府取奏多聱牙不可通由樂人於不合宮商者增損其文又或有聲無文聲詞混填至於不可通者非本詩如是也李于鱗乃取晋宋齊隋樂志所載截而句擬之生吞活剥謂之擬樂府而宗子相所作全不可通陳子龍效之讀之使人失笑王元美論歌行云有奇句奪人魄者直以為歌行而不知其為擬古樂府也樂府詞體不一漢人承離騷之後故歌謡多奇語魏武悲凉慷慨與詩人不同而史志所載亦有平美者班媫妤團扇青青河畔草皆樂府也鍾伯敬承于鱗之說遂謂竒詭聱牙者為樂府平羙者為詩至謂古詩某句似樂府樂府某句似古詩謬之極矣古來言樂府者惟宋書最詳整其次則隋書及南齊書晋書樂志不及也郭茂倩樂府詩集為詩而作刪諸家樂志作序甚明白而無遺悮作歌行樂府者不可不讀律詩後譜畧採數首不外於前所謂舉一隅也集中所選雖不盡當要須熟讀以接風騷遺則聲調譜論例
