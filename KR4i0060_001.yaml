  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0060_WYG_001-1a, image: WYG1483/WYG1483-0906a.png}
body:
  text: 聲調譜卷一右贊善趙執信撰五言古詩秦越人洞中詠于鵠扁鵲得拗字仙處傳是西南峰三平聲字年年山下人下句是律上句第五字必平第三字平亦拗以别律長見騎白龍上注言凡下句是律之調如此非謂此句而此句亦非律也洞門黑無底拗句同律日夜惟雷風三平清齊將入時平戴星兼抱松拗律句拗在第一字仄第三字平石徑隂且寒平地響知逺鐘古句似行山林三平外聞葉履聲重上句不律下句可律此句律底礙更俯身平上四字仄漸逺晝夜四仄同時時白蝙蝠律句飛入茅衣中三平行久路轉窄四仄靜聞平不平則為律矣水淙平淙但願逢一人平自得朝天宮三平總之兩句一聮中斷不得與律詩相亂也息舟荆溪入陽羡南山遊善權寺呈李功曹羊士諤結纜蘭渚曉紫嵓平上仄連平岡晏溫值初霽二四平起句二四仄得此句調甚協去繞山河長三平獻嵗氷雪盡細仄在律詩則為失調泉在路傍行披松杉四平入激瀾橫石梁層閣表精廬律飛甍切雲翔冲襟得髙步清眺極逺三仄方潭嶂積仄佳氣荑英多平早芳二句律中拗救句可用具觀澤仄國秀重使春心傷三平念遵煩平促塗與澤國句並拗律榮利騖隙光勉君脫冠意共匿無何鄉三平七言古詩西山詩和者三十餘人再次前韻為謝蘇軾朱顔發過如春醅胸中梨棗初未裁丹砂未易掃白髮赤松却欲催黃梅寒溪本自逺公社拗律句白蓮翠竹依崔嵬當時石泉照金像神光夜發如五臺飲泉鑑面得真意亦拗律坐視萬物皆浮埃欲收暮景返田里亦拗律逆溯江水窮離堆還朝豈獨羞老病自嘆才盡傾空罍諸公渠渠若夏屋吞吐風月清隅隈我如廢井久不食古甃缺落生隂苔數詩往復相感發汲新除舊寒光開遙知二月春江濶律句雲浪倒捲雲峯摧石中無聲水亦靜云何解轉空山雷欲就諸公評此句律要識憂喜何從來願求南宗一勺水往與屈賈湔餘哀和蔣䕫寄茶我生百事常隨緣四方水陸無不便第五字平第六字仄便非律句扁舟渡江適吳越仄此字不可輕用平聲三年飲食窮芳鮮此三字平第四字必仄如第四字平則第六字必仄以救之此法人多不知金虀玉膾飯炊雪拗律句海螯江柱初脫泉臨風飽食甘寢罷一甌花乳浮輕圓自從捨舟入東武沃野便到桑麻川剪毛胡羊大如馬誰記鹿角腥盤筵厨中蒸粟埋飯甕大杓更取酸生涎柘羅銅碾棄不用脂麻白土須盆研故人猶作舊眼看謂我好尚如當年沙溪北苑强分別拗律水腳一線爭誰先清詩兩幅寄千里上句雖不論亦宜少拗乃健拗律句此正謂苐五字拗也紫金百餅費萬錢即六字仄獨令末一字平亦可吟哦烹噍兩竒絶拗律只恐偷乞煩封纒老妻稚子不知愛拗律一半已入薑鹽煎人生所遇無不可南北嗜好知誰賢死生禍福久不擇更論甘苦爭媸妍知君窮旅不自釋因詩此二字不論寄謝聊相鐫樂詞正月李賀上樓迎春新春歸六字皆平暗黃平著栁宮漏仄遲薄薄淡靄㺯野六字皆仄姿第七字用平下句可律寒緑幽風生平短絲律句第五字用平少拗以叶之錦床曉卧玉拗字肌冷露臉未開平對朝仄暝官衙栁帶不拗字堪折蚤晚菖蒲勝綰結三月東方風來滿眼春花城栁暗愁煞人復宮深殿竹風起新翠舞襟淨如水光風轉蕙百拗餘里暖霧驅雲撲天地軍妝宫妓掃拗蛾淺搖搖錦旗夾城暖曲水飄香去不歸梨花落盡成秋苑此二句亦宜少拗乃健謂二句俱律也五月雕玉押簾額輕縠籠虛門井汲鉛華水律句扇織鴛鴦紋三平回雪舞涼殿甘露洗空緑第一句同此二句皆拗律也羅袖從徊翔三平香汗沾寶粟七月星依雲渚冷律句露滴盤中圎三平好花生朩末律句衰蕙愁空園三平第三字不平亦律句矣夜天如玉砌池葉極青錢二句律僅厭舞仄衫薄稍知花平簟寒二句拗律曉風何拂拂律北斗光欄杆九月離宫散螢天似水竹黃池冷芙蓉死律句月綴金鋪光脉脉凉院虛庭空淡白二句亦律露華飛飛風草草翠錦斑斕滿層道拗律雞人罷唱曉瓏璁鴉啼金井下疏桐二句亦律十月玉壺銀箭稍難傾律缸花夜笑凝幽明碎霜斜舞上羅幕拗律燭龍兩行照飛閣珠幃怨臥不成眠律金鳳刺衣著體寒第五字仄與拗律少異長眉對月鬪彎環律五言律詩句溪夏日送盧霈秀才歸王屋山將欲赴舉杜牧野店正宜平而仄分泊繭蠺初宜仄而平第一字仄第三字必平引絲第三字救上句亦可不救二句律句中拗行人碧宜平而仄溪宜仄而平渡拗句第四字拗平第三字斷斷用仄今人不論者非繫馬緑楊枝不對格而實對苒苒跡始去五字俱仄中有入聲字妙悠悠心此字必平救上句所期此必不可不救因上句第三第四字皆當平而反仄必以此第三字平聲救之否則落調矣上句仄仄平仄仄亦同秋山念君别拗同第三句惆悵桂花時落花李商隱髙閣客竟去拗句起小園花此字拗救亂飛此二句同前第五第六句參差連曲陌迢遞送斜暉腸斷未忍掃同起句眼此字仄妙穿仍欲歸同次句芳心向春盡同前第三句第七句所得是沾衣平平仄仄仄下句仄仄仄平平律詩常用若仄平仄仄仄則為落調矣蓋下有三仄上必二平也律詩平平仄仄平第二句之正格若仄平平仄平變而仍律者也即是拗句仄平仄仄平則古詩句矣此格人多不知者由一三五不論二語誤之也七言不過於五言上加平平仄仄耳拗處總在第五第六字上七言之五六字即五言之三四字可以類推起句第二字仄第四字平者如仄仄平平仄或平仄平平仄或平仄仄平平俱可若平仄平仄仄則古詩句矣起句仄仄仄平仄或平仄仄平仄唐人亦有此調但下句必須用三平或四平如仄平平仄平平平平仄平是也上句第三字平下句第三字可仄若上句第三字仄下句第三字斷宜平此在首聮唐人亦有不拘者若二聮則必不容不嚴矣聲調譜卷一
