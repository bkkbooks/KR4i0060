body:
  text: 聲調譜卷三右贊善趙執信撰樂府怨詩行曹植明月照髙樓流光正徘徊上有思愁婦悲嘆有餘哀一解借問嘆者誰自云蕩子妻夫行踰十載賤妾常獨棲二解念君過於渴思君劇於飢君作髙山柏妾為濁水泥三解北風行蕭蕭烈烈入吾耳心中念故人淚墮不能止四解浮沉各異路會合當何諧願作東北風吹我入君懷五解君懷常不開賤妾當何依恩情中道絶流止任東西六解我欲竟此曲此曲悲且長今日樂相樂别後莫相忘七解樂府惟漢魏中著解者多蓋樂府自三百篇出一解猶風雅中一章耳大都不著解者通為一章意句不得重復前後綰應森細著解者詞意循環相生如我之棄婦詞第二首亦可四句為一解也欲知樂府源流非檢郭茂倩樂府不可雜言寄杜拾遺任華杜拾遺名甫第二才甚竒任生與君别來已多時何嘗一日不相思杜拾遺知不知昨日有人誦得數篇黃絹詞吾怪異竒特借問果然稱是杜二之所為勢攫虎豹氣騰蛟螭滄海無風似鼓蕩華嶽平地欲奔馳曺劉俯仰慚大敵沈謝逡巡稱小兒昔在帝城中盛名君一個諸人見所作無不心膽破郎官叢裏作狂歌丞相閣中常醉臥前年皇帝歸長安承恩濶步青雲端積翠扈遊花匼匝披香寓直月團欒英才特達承天眷公卿無不相欽羡只緣汲黯好直言遂使安仁却為掾如今避地錦城隅幕下英寮每日相隨提玉壺半醉起舞捋髭鬚乍低乍昻旁若無古人制禮但為防俗士豈得為君設之乎而我不飛不鳴亦何以只待朝廷有知已亦曽讀却無限書拙詩一句兩句在人耳如今看之總無益又不能﨑嶇傍朝市且當事耕稼豈得便徒爾南陽葛亮為友朋東山謝安作鄰里間常把琴弄悶即擕尊起鶯啼二月三月時花放千山萬山裏此時幽曠無人知火急將書憑驛使為報杜拾遺此詩題上元有雜言二字雜言所以不列於譜者以其句法即同於五七言古詩句法也八九十一字句不過因七言古詩擴而充之亦只在末四字中尋筋節其轉韻處與轉韻歌行同三四字句不拘可以意會耳既無定局字句多寡長短皆任意從何譜之舉一隅以一隅反可也蜀道難李白噫吁􅐵危乎髙哉蜀道之難難於上青天蠶叢及魚鳬開國何茫然爾來四萬八千嵗不與秦塞通人煙西當太白有鳥道可以橫絶峨嵋巔地崩山摧壯士死然後天梯石棧相鈎連上有六龍回日之髙標下有衝波逆折之回川黃鶴之飛尚不得過猿猱欲渡愁攀援青泥何盤盤百步九折縈嵒巒捫參厯井仰脅息以手撫膺坐長嘆問君西遊何時還畏途巉巗不可攀但見悲鳥號古木雄飛呼雌繞林間又聞子規啼夜月愁空山蜀道之難難於上青天使人聽此凋朱顔連峰去天不盈尺枯松倒挂倚絶壁飛湍瀑流爭喧豗砯崖轉石萬壑雷其險也如此嗟爾逺道之人胡為乎來哉劍閣峥嶸而崔嵬一夫當關萬夫莫開所守或非親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如蚤還家蜀道之難難於上青天側身西望長咨嗟青蓮集他作尚多此種實鼻祖也柏梁體箜篌引王昌齡盧溪郡南夜泊舟夜聞兩岸羌戎謳其時月黑猿啾啾微雨沾衣令人愁有一遷客登髙樓不言不寐彈箜篌彈作薊門桑葉秋拗律句風沙颯颯青塜頭將軍鐵驄汗血流深入丐奴戰未休律句黃旗一點兵馬收亂殺敵人積如丘瘡病驅來役邉州仍披漠北羔羊裘顔色飢枯掩面羞律句眼眶淚滴深兩眸思還本鄉食氂牛欲語不得指咽喉或有強壯能咿嚘意説被他邉將讐拗律句五世屬蕃漢主留碧毛氊帳河曲遊槖駝五萬部落稠敕賜飛烏金兜鍪為君百戰如過籌靜掃隂山無鳥投律句少拗家藏鐵劵特承優律句黃金千斤不稱求九族分離作楚囚律句深溪寂寞絃苦幽草木悲感聲颼颼僕本東山為國憂律句眀光殿前論九疇簏讀兵書盡𡨕搜為君掌上施權謀洞曉山川無與儔律句少拗紫宸詔發逺懷柔律句搖筆飛霜如奪鉤律句少拗鬼神不得知其由憐愛蒼生比蚍蜉朔河屯兵須漸抽盡遣降耒拜御溝律句便令海內休戈矛何用班超定逺侯律句史臣書之得已不此詩正同陸渾山火句法假借處此詩更同聲調譜卷三
